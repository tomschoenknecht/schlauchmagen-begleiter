kind = "web"
previewPath = "/"
title = "Schlauchmagen Begleiter"
version = "1.0.0"
id = "artifacts/schlauchmagen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19934

[services.development]
run = "pnpm --filter @workspace/schlauchmagen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/schlauchmagen", "run", "build" ]
publicDir = "artifacts/schlauchmagen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19934"
BASE_PATH = "/"
